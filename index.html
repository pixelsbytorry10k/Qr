<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(60deg, #000, #ff4d6d);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        main {
            display: flex;
            width: 100%;
            height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .sidenav {
            position: absolute;
            background: #02123696;
            width: 6cm;
            box-shadow: 0 0 10px 0px #ffffff;
            display: block;
            left: 0;
            top: 0;
            height: 100vh;
        }

        .sidenav a {
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            font-weight: 20;
            font-family: Arial, Helvetica, sans-serif;
            display: block;
            padding: 30px 20px;
            cursor: pointer;

        }

        .sidenav a:hover {
            background: #140952e0;

        }

        .box {
            background: #1e1e1e75;
            box-shadow: 0 0 10px 0px #fff;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            width: 13cm;
            height: 15cm;
        }

        #headerText {
            font-size: 20px;
            font-weight: 20;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 5px 5px;
            border: none;
            background: white;
            color: #021236;
            border-radius: 10px;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 20;
            font-size: 13px;
            box-shadow: 0 0 10px 0px blue;
        }

        button:hover {
            box-shadow: 0 0 20px 0px rgb(255, 0, 0);

        }

        #generateQRimgbtn {
            box-shadow: none;
            background: white;
            color: #021236;
            border: 4px solid #021236;
        }

        @media(max-width:500px) {
            #sideNav {
                display: none;
            }
        }

        #qr {
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <main>

        <div class="box">
            <h2 id="headerText">QR Code Generator</h2>
            <input type="text" id="text" placeholder="Enter text or link"><br><br>
            <div style="display: flex;justify-content: center;gap: 10px;">
                <button onclick="generateQR()" id="generateQRbtn">Generate QR Code</button>
                <br><br>
                <button onclick="downloadQR()">Download QR</button>
            </div>
            <br>
            <div style="background: #f5f5f5;width: 250px;height: 250px;border-radius: 15px; justify-self: center;">
                <div id="qr" style="justify-self: center;"></div>

            </div>
        </div>
        <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
        <script>
            let qrCode;

            function generateQR() {
                const text = document.getElementById("text").value;
                const qrContainer = document.getElementById("qr");

                qrContainer.innerHTML = "";

                if (!text) {
                    alert("Enter something first");
                    return;
                }

                qrCode = new QRCodeStyling({
                    width: 250,
                    height: 250,
                    data: text,

                    dotsOptions: {
                        color: "#000000",
                        type: "rounded" // 🔥 rounded dots
                    },

                    backgroundOptions: {
                        color: "transparent"

                    },

                    cornersSquareOptions: {
                        type: "extra-rounded", // 🔥 THIS is what you want
                        color: "#000000"
                    },

                    cornersDotOptions: {
                        type: "dot",
                        color: "#000000"
                    }
                });

                qrCode.append(qrContainer);
            }
            function downloadQR(){
                if (!qrCode){
                    alert("Generate a QR Code first");
                    return
                }

                qrCode.download({
                    name:document.getElementById("text").value || "qr-code",
                    extension: "png"
                });
            }
        </script>
    </main>
</body>

</html>
